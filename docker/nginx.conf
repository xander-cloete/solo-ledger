# nginx server config for Solo Ledger (a static Vite + React PWA).
#
# Two jobs that a plain static server doesn't do out of the box:
#   1. SPA fallback  — react-router owns the URLs, so any path that isn't a real
#      file must return index.html (status 200, not 404) and let the app route it.
#      Without this, refreshing /investments or deep-linking it would 404.
#   2. PWA-safe caching — the service worker only ships new code if the browser
#      actually re-fetches sw.js and index.html. Those must NOT be cached. The
#      hashed files in /assets/ get a brand-new name every build, so they're safe
#      to cache "forever" (immutable) for fast loads.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the way out (small, cheap win).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # --- Hashed build output: filename changes every build, cache hard ---
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # --- PWA control files: must always revalidate so updates land ---
    # The service worker, its registration shim, the Workbox runtime and the
    # web manifest are fetched by name, so caching them would freeze the app on
    # an old version. no-cache = "you may store it, but always check first".
    location = /sw.js              { add_header Cache-Control "no-cache"; }
    location = /registerSW.js      { add_header Cache-Control "no-cache"; }
    location ~* ^/workbox-.*\.js$  { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
    location = /index.html        { add_header Cache-Control "no-cache"; }

    # --- Everything else: real file if it exists, otherwise the SPA shell ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
